<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <clipPath id="bull-clip">
      <circle cx="120" cy="120" r="68"/>
    </clipPath>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a7a7a"/>
      <stop offset="30%" stop-color="#b8b8b8"/>
      <stop offset="50%" stop-color="#909090"/>
      <stop offset="70%" stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <filter id="drop">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- 12-tooth gear centered at 120,120 -->
  <g filter="url(#drop)">
    <polygon points="
      120,14 130,14 136,30 144,26 152,34 146,46
      156,52 160,44 170,48 168,60 178,66 176,58
      186,66 182,78 190,86 186,94 192,104 184,108
      186,120 186,130 170,136 174,144 166,152 154,146
      148,156 156,160 152,170 140,168 134,178 142,176
      134,186 122,182 120,190 118,182 106,186 98,176
      106,178 100,168 88,170 84,160 92,156 86,146
      74,152 66,144 70,136 54,130 54,120 56,108
      48,104 54,94 50,86 58,78 54,66 64,58
      62,66 72,60 70,48 80,44 84,52 94,46
      88,34 96,26 104,30 110,14
    " fill="url(#metal)" stroke="#555" stroke-width="0.8"/>
  </g>

  <!-- Inner dark circle -->
  <circle cx="120" cy="120" r="70" fill="#0a0a0a" stroke="#333" stroke-width="2"/>

  <!-- Bull photo -->
  <g clip-path="url(#bull-clip)">
    <image href="hero-bull.jpg" x="30" y="20" width="180" height="200" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <!-- Red accent ring -->
  <circle cx="120" cy="120" r="68" fill="none" stroke="#e63946" stroke-width="2" opacity="0.5"/>
  <circle cx="120" cy="120" r="71" fill="none" stroke="#e63946" stroke-width="0.5" opacity="0.3"/>
</svg>
